<!--
  ion-split-pane: es el componente clave.
  - when="md"  → sidebar visible en pantallas >= 768px (desktop/tablet)
  - En mobile  → sidebar colapsado, se abre como overlay al tocar el botón
  contentId debe coincidir con el id del ion-router-outlet
-->
<ion-app>
  <ion-split-pane contentId="main-content" when="md">

    <!-- ===== SIDEBAR / MENU LATERAL ===== -->
    <ion-menu contentId="main-content" menuId="main-menu" type="overlay">

      <!-- Header del sidebar -->
      <ion-header>
        <ion-toolbar color="primary">
          <ion-title class="sidebar-title">
            <ion-icon name="layers-outline" class="mr-2"></ion-icon>
            Mi App
          </ion-title>
        </ion-toolbar>
      </ion-header>

      <!-- Contenido del sidebar: navegación -->
      <ion-content class="sidebar-content">

        <!-- Perfil de usuario -->
        <div class="sidebar-user-card d-flex align-items-center p-3">
          <ion-avatar class="mr-3">
            <img src="https://ionicframework.com/docs/img/demos/avatar.svg" alt="Avatar" />
          </ion-avatar>
          <div>
            <p class="mb-0 font-weight-bold text-white">Juan García</p>
            <small class="text-white-50">Administrador</small>
          </div>
        </div>

        <ion-list lines="none" class="sidebar-nav mt-2">

          <!-- Grupo: Principal -->
          <ion-list-header>Principal</ion-list-header>

          <ion-menu-toggle autoHide="false">
            <ion-item routerLink="/home" routerLinkActive="active-link" detail="false" button>
              <ion-icon name="home-outline" slot="start"></ion-icon>
              <ion-label>Inicio</ion-label>
            </ion-item>
          </ion-menu-toggle>

          <ion-menu-toggle autoHide="false">
            <ion-item routerLink="/dashboard" routerLinkActive="active-link" detail="false" button>
              <ion-icon name="bar-chart-outline" slot="start"></ion-icon>
              <ion-label>Dashboard</ion-label>
            </ion-item>
          </ion-menu-toggle>

          <ion-menu-toggle autoHide="false">
            <ion-item routerLink="/reports" routerLinkActive="active-link" detail="false" button>
              <ion-icon name="document-text-outline" slot="start"></ion-icon>
              <ion-label>Reportes</ion-label>
            </ion-item>
          </ion-menu-toggle>

          <!-- Grupo: Administración -->
          <ion-list-header class="mt-3">Administración</ion-list-header>

          <ion-menu-toggle autoHide="false">
            <ion-item routerLink="/users" routerLinkActive="active-link" detail="false" button>
              <ion-icon name="people-outline" slot="start"></ion-icon>
              <ion-label>Usuarios</ion-label>
            </ion-item>
          </ion-menu-toggle>

          <ion-menu-toggle autoHide="false">
            <ion-item routerLink="/settings" routerLinkActive="active-link" detail="false" button>
              <ion-icon name="settings-outline" slot="start"></ion-icon>
              <ion-label>Configuración</ion-label>
            </ion-item>
          </ion-menu-toggle>

        </ion-list>

        <!-- Separador y cerrar sesión al final -->
        <div class="sidebar-footer p-3">
          <ion-button expand="block" fill="outline" color="medium" size="small">
            <ion-icon name="log-out-outline" slot="start"></ion-icon>
            Cerrar sesión
          </ion-button>
        </div>

      </ion-content>
    </ion-menu>
    <!-- ===== FIN SIDEBAR ===== -->

    <!-- ===== ÁREA DE CONTENIDO PRINCIPAL ===== -->
    <!--
      El id="main-content" vincula este outlet con el split-pane y el menu.
      Cuando el sidebar está visible (desktop), el contenido se empuja automáticamente.
    -->
    <ion-router-outlet id="main-content"></ion-router-outlet>
    <!-- ===== FIN ÁREA DE CONTENIDO ===== -->

  </ion-split-pane>
</ion-app>
